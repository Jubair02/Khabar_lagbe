services:
  - type: web
    name: khabar-lagbe
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/menu
    envVars:
      - key: NODE_VERSION
        value: 20
      # Secrets — set these in the Render dashboard (do NOT commit them):
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
