<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Khabar Lagbe</title>
    <meta name="robots" content="noindex">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="brand"><i class="fas fa-utensils"></i> Khabar Lagbe</div>
        <nav>
            <a href="#" class="active"><i class="fas fa-receipt"></i> Orders</a>
            <a href="index.html" target="_blank"><i class="fas fa-store"></i> View Store</a>
            <a href="#" id="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
        <div class="conn">
            <span class="dot" id="conn-dot"></span>
            <span id="conn-text">Connecting...</span>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <div style="display:flex; align-items:center; gap:14px;">
                <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
                <div>
                    <h1>Orders Dashboard</h1>
                    <div class="subtitle">Manage all customer orders in real time</div>
                </div>
            </div>
        </div>

        <!-- Stat cards -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-icon" style="background:#3498db;"><i class="fas fa-shopping-bag"></i></div>
                <div class="stat-info"><div class="value" id="stat-total">0</div><div class="label">Total Orders</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#f39c12;"><i class="fas fa-clock"></i></div>
                <div class="stat-info"><div class="value" id="stat-pending">0</div><div class="label">Active (Pending/Proc.)</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#2ecc71;"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info"><div class="value" id="stat-delivered">0</div><div class="label">Delivered</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#ff9f1c;"><i class="fas fa-coins"></i></div>
                <div class="stat-info"><div class="value" id="stat-revenue">৳0</div><div class="label">Revenue</div></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search by name, phone or address...">
            </div>
            <select id="status-filter">
                <option value="">All Statuses</option>
                <option value="Pending">Pending</option>
                <option value="Processing">Processing</option>
                <option value="Shipped">Shipped</option>
                <option value="Delivered">Delivered</option>
                <option value="Cancelled">Cancelled</option>
            </select>
            <select id="sort-select">
                <option value="-createdAt">Newest first</option>
                <option value="createdAt">Oldest first</option>
                <option value="-total">Total: high to low</option>
                <option value="total">Total: low to high</option>
                <option value="status">Status: A–Z</option>
            </select>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Order</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="orders-body"></tbody>
            </table>
        </div>
    </main>

    <!-- Details Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Order Details</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-note" id="toast-note">
        <i class="fas fa-bell"></i>
        <span id="toast-note-msg"></span>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
